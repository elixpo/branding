name: "Asset Request"
description: "Request a sticker, icon, or banner — auto-styled in the Oreo / Elixpo look."
title: "[asset] "
labels: ["asset-request"]
body:
  - type: markdown
    attributes:
      value: |
        Just say what you want — the bot automatically renders it in the
        warm kawaii-pixel **Oreo / Elixpo** style, so you don't need to
        describe the art style yourself.

        A maintainer reviews and applies the **`approved`** label, which
        triggers generation.

  - type: dropdown
    id: asset_type
    attributes:
      label: Asset type
      description: Sets the size and finish.
      options:
        - Sticker (1024×1024, transparent)
        - Icon (1024×1024, transparent)
        - Banner (1024×512)
        - Other (1024×1024)
    validations:
      required: true

  - type: textarea
    id: describe
    attributes:
      label: Describe it
      description: |
        One or two lines — what should it be? e.g.
        "Oreo surfing a big wave", "a coffee cup", "Oreo as an astronaut".
        Oreo the panda is included by default; add **"no mascot"** if you
        want just the object.
      placeholder: "Oreo riding a skateboard doing a trick"
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirm
      options:
        - label: "I understand a maintainer must apply the `approved` label before generation runs."
          required: true
